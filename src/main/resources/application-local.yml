# ════════════════════════════════════════════════
# 로컬 개발 전용 설정 (MySQL/Redis 없이 H2로 실행)
# 실행 방법: -Dspring.profiles.active=local
# ════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:h2:mem:herotalk;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # 실행 시 테이블 자동 생성/삭제
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  h2:
    console:
      enabled: true           # http://localhost:8080/h2-console 접근 가능

  # Redis 자동설정 비활성화 (로컬에서 Redis 없이 실행)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: local-dev-secret-key-minimum-32-characters-long!!
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

app:
  frontend-url: http://localhost:3000

server:
  port: 8080

logging:
  level:
    org.herotalk: DEBUG
    org.springframework.security: DEBUG
